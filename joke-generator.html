<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .joke-text {
            color: white;
            font-size: 20px;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .joke-answer {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            font-style: italic;
            margin-top: 15px;
            display: none;
        }

        .joke-answer.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-new {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-new:active {
            transform: translateY(0);
        }

        .btn-reveal {
            background: #f39c12;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-reveal:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        .btn-reveal:active {
            transform: translateY(0);
        }

        .joke-type {
            display: inline-block;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .error.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .joke-text {
                font-size: 16px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get Your Daily Laugh</p>

        <div class="joke-box">
            <div class="emoji" id="emoji">😄</div>
            <div id="jokeTypeDisplay" class="joke-type" style="display: none;"></div>
            <div id="jokeContainer">
                <div class="loader"></div>
            </div>
            <div id="jokeAnswer" class="joke-answer"></div>
        </div>

        <div id="error" class="error"></div>

        <div class="button-group">
            <button class="btn-new" onclick="fetchJoke()">Get New Joke</button>
            <button class="btn-reveal" onclick="revealAnswer()">Reveal Answer</button>
        </div>

        <p style="color: #999; margin-top: 20px; font-size: 12px;">
            Powered by JokeAPI
        </p>
    </div>

    <script>
        let currentJoke = null;

        // Fetch joke from API
        async function fetchJoke() {
            const jokeContainer = document.getElementById('jokeContainer');
            const jokeAnswer = document.getElementById('jokeAnswer');
            const error = document.getElementById('error');
            const jokeTypeDisplay = document.getElementById('jokeTypeDisplay');

            // Reset
            jokeAnswer.classList.remove('show');
            error.classList.remove('show');
            jokeTypeDisplay.style.display = 'none';

            // Show loader
            jokeContainer.innerHTML = '<div class="loader"></div>';

            try {
                // Fetch from JokeAPI
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single,twopart');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('API Error: ' + data.message);
                }

                currentJoke = data;

                // Display joke
                if (data.type === 'single') {
                    jokeContainer.innerHTML = `<div class="joke-text">${escapeHtml(data.joke)}</div>`;
                    jokeAnswer.innerHTML = '';
                    jokeTypeDisplay.style.display = 'none';
                } else {
                    jokeContainer.innerHTML = `<div class="joke-text">${escapeHtml(data.setup)}</div>`;
                    jokeAnswer.innerHTML = `<div class="joke-text">${escapeHtml(data.delivery)}</div>`;
                    jokeTypeDisplay.textContent = 'Two-Part Joke';
                    jokeTypeDisplay.style.display = 'inline-block';
                }

                // Change emoji based on category
                const emoji = document.getElementById('emoji');
                const categoryEmojis = {
                    'General': '😄',
                    'Programming': '💻',
                    'Knock-Knock': '🚪',
                    'Misc': '🎭',
                    'Dark': '🌑',
                    'Spooky': '👻'
                };
                emoji.textContent = categoryEmojis[data.category] || '😂';

            } catch (err) {
                console.error('Error:', err);
                jokeContainer.innerHTML = '';
                error.textContent = 'Oops! Failed to load joke. Please try again.';
                error.classList.add('show');
            }
        }

        // Reveal answer
        function revealAnswer() {
            const jokeAnswer = document.getElementById('jokeAnswer');
            if (currentJoke && currentJoke.type === 'twopart') {
                jokeAnswer.classList.add('show');
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load initial joke
        window.addEventListener('load', () => {
            fetchJoke();
        });

        // Allow Enter key to fetch new joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchJoke();
            }
        });
    </script>
</body>
</html>
